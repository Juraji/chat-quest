<div class="container">
  <app-page-header>
    <span class="page-title">Species</span>
    <button class="btn btn-primary" routerLink="./new">Create Species</button>
  </app-page-header>

  <div class="grid">
    @for (s of species(); track s.id) {
      <div class="g-col-6 g-col-lg-3">
        <species-card [species]="s" [routerLink]="['.', s.id]" class="cursor-pointer">
          <button class="btn">
            <span class="bi bi-pencil"></span>
          </button>
        </species-card>
      </div>
    }
    <div class="g-col-6 g-col-lg-3">
      <app-new-item-card routerLink="./new">
        <span>Add Species</span>
      </app-new-item-card>
    </div>
  </div>
</div>
